# PROJECT_STATUS.yaml — Template
# Kopiere dieses File in das Root-Verzeichnis jedes Coding-Repos.
# Claude Code aktualisiert es am Ende jeder Session (siehe CLAUDE.md-Anweisung unten).
#
# Felder:
#   project:              Name des Projekts (wie im Obsidian-Vault)
#   status:               idea | planning | active | paused | done | abandoned
#   category:             coding | band | writing | personal | work | tooling
#   last_session:         Datum der letzten Claude Code Session (YYYY-MM-DD)
#   last_session_summary: 1-2 Sätze, was in der Session passiert ist
#   next_step:            Was als nächstes ansteht
#   blockers:             Liste von Blockern (leer wenn keine)
#   tech_stack:           Verwendete Technologien

project: "PROJEKTNAME"
status: active
category: coding
last_session: null
last_session_summary: null
next_step: "NÄCHSTER SCHRITT"
blockers: []
tech_stack:
  - python
